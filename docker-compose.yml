version: "3.8"

services:
  zipsa:
    build:
      context: https://github.com/sulgik/zipsa.git
      dockerfile: Dockerfile
    container_name: zipsa
    restart: unless-stopped
    ports:
      - "8000:8000"   # Relay API (proxied by nginx in production)
      - "7861:7861"   # Monitor dashboard (admin only)
    environment:
      # External LLM (Claude)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # Local LLM (Ollama Cloud or empty for heuristic-only)
      - LOCAL_HOST=${LOCAL_HOST:-}
      - LOCAL_API_KEY=${LOCAL_API_KEY:-}
      - LOCAL_MODEL=${LOCAL_MODEL:-qwen3.5:9b}

      # Demo settings
      - DEMO_MODE=${DEMO_MODE:-true}
      - LOG_DIR=/app/logs
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zipsa-network

  nginx:
    image: nginx:alpine
    container_name: zipsa-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    environment:
      - ADMIN_TOKEN=${ADMIN_TOKEN}
    depends_on:
      - zipsa
    networks:
      - zipsa-network

  # Optional: Certbot for Let's Encrypt
  certbot:
    image: certbot/certbot
    container_name: zipsa-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./nginx/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - production

networks:
  zipsa-network:
    driver: bridge

volumes:
  logs:
  data:
