# Fly.io deployment config for Zipsa Demo
app = "zipsa-demo"
primary_region = "nrt"  # Tokyo — closest to Seoul

[build]
  dockerfile = "Dockerfile"

[env]
  DEMO_MODE = "true"
  LOG_DIR = "logs"
  # "Local" LLM: fast/cheap model via OpenRouter (demo only — not a real trust zone)
  LOCAL_HOST = "https://openrouter.ai/api/v1"
  LOCAL_MODEL = "qwen/qwen-2.5-7b-instruct"
  # External LLM: capable model for complex domain reasoning
  EXTERNAL_PROVIDER = "openai"
  EXTERNAL_MODEL = "anthropic/claude-sonnet-4-5"
  OPENAI_BASE_URL = "https://openrouter.ai/api/v1"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "zipsa_data"
  destination = "/app/data"

[[statics]]
  guest_path = "/app/logs"
  url_prefix = "/logs"
