events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=monitor:10m rate=5r/s;

    # Upstream servers
    upstream zipsa_api {
        server zipsa:8000;
    }

    upstream zipsa_monitor {
        server zipsa:7861;
    }

    # HTTP server (redirect to HTTPS in production)
    server {
        listen 80;
        server_name _;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # For local development, proxy directly
        # In production, uncomment the redirect below
        # return 301 https://$host$request_uri;

        # Public API endpoint
        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://zipsa_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running requests
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }

        # Admin monitor dashboard - requires authentication
        location /monitor {
            limit_req zone=monitor burst=10 nodelay;

            # Check for Authorization header with Bearer token
            set $admin_token "";
            if ($http_authorization ~* "^Bearer\s+(.+)$") {
                set $admin_token $1;
            }

            # Validate token (set via environment variable at container start)
            # In production, use a more secure validation method
            if ($admin_token = "") {
                return 401 '{"error": "Authorization required. Use: Authorization: Bearer YOUR_ADMIN_TOKEN"}';
            }

            # Note: For proper token validation, use auth_request or Lua
            # This basic check requires manual token comparison in production

            proxy_pass http://zipsa_monitor/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Gradio needs longer timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Gradio websocket support for monitor
        location /monitor/queue/ {
            set $admin_token "";
            if ($http_authorization ~* "^Bearer\s+(.+)$") {
                set $admin_token $1;
            }
            if ($admin_token = "") {
                return 401;
            }

            proxy_pass http://zipsa_monitor/queue/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check endpoint
        location /health {
            proxy_pass http://zipsa_api/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }

